# Capability profile override: generic minimal (TOML)
#
# Usage:
#   strix subsystem set-capabilities my-sub -f examples/capabilities/generic_min.toml

model = "Strix-Generic"
version = "1.0.0"

[features]
thin_provisioning = true
snapshots = false
clones = false
replication = false

[limits]
max_volumes = 1024
