# Strix Gateway topology: minimal single-array example
#
# Usage:
#   strix validate -f examples/ci/topo-min.yaml
#   strix apply -f examples/ci/topo-min.yaml
#   strix smoke -f examples/ci/topo-min.yaml

arrays:
  - name: dev-arr
    endpoints:
      - protocol: iscsi

pools:
  - name: pool-a
    array: dev-arr
    backend: malloc
    size_gb: 50

hosts:
  - name: host-01
    iqns:
      - "iqn.1993-08.org.debian:01:deadbeef"

volumes:
  - name: vol-001
    size_gb: 10
    pool: pool-a

mappings:
  - host: host-01
    volume: vol-001
    protocol: iscsi
