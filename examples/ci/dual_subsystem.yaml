# Apollo Gateway topology: two IBM SVC arrays sharing one gateway
#
# Demonstrates:
#  - Two arrays with the same pool name ("gold") — allowed because pools
#    are scoped per array
#  - Mixed protocols: svc-a uses iSCSI, svc-b uses NVMe-oF TCP
#  - A global host that maps to volumes in both arrays

arrays:
  - name: svc-a
    vendor: ibm_svc
    profile:
      model: "FlashSystem-5200"
      version: "8.6.0.0"
      features:
        thin_provisioning: true
        snapshots: true
        replication: false
    endpoints:
      - protocol: iscsi

  - name: svc-b
    vendor: ibm_svc
    profile:
      model: "FlashSystem-9200"
      version: "8.6.0.0"
      features:
        thin_provisioning: true
        snapshots: true
        replication: true
    endpoints:
      - protocol: nvmeof_tcp

pools:
  - name: gold
    array: svc-a
    backend: malloc
    size_gb: 100

  - name: gold
    array: svc-b
    backend: malloc
    size_gb: 200

hosts:
  - name: compute-01
    iqns:
      - "iqn.1993-08.org.debian:01:abc123"
    nqns:
      - "nqn.2014-08.org.nvmexpress:compute-01"

volumes:
  - name: vol-a-001
    size_gb: 20
    pool: gold

mappings:
  - host: compute-01
    volume: vol-a-001
    protocol: iscsi
