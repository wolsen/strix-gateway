# FILE: docker-compose.yml
services:
  spdk_tgt:
    image: ghcr.io/spdk/spdk:latest
    privileged: true
    volumes:
      - spdk_socket:/var/tmp
      - /dev/hugepages:/dev/hugepages
    network_mode: host
    command: ["spdk_tgt", "-S", "/var/tmp"]
    restart: unless-stopped

  apollo_gateway:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - spdk_socket:/var/tmp
    environment:
      APOLLO_SPDK_SOCKET_PATH: /var/tmp/spdk.sock
      APOLLO_DATABASE_URL: sqlite+aiosqlite:///./apollo_gateway.db
      APOLLO_ISCSI_PORTAL_IP: "0.0.0.0"
      APOLLO_ISCSI_PORTAL_PORT: "3260"
      APOLLO_NVMEF_PORTAL_IP: "0.0.0.0"
      APOLLO_NVMEF_PORTAL_PORT: "4420"
      APOLLO_IQN_PREFIX: "iqn.2026-02.lunacysystems.apollo"
      APOLLO_NQN_PREFIX: "nqn.2026-02.io.lunacysystems:apollo"
    depends_on:
      - spdk_tgt
    restart: unless-stopped

volumes:
  spdk_socket:
