# Strix Gateway topology: SVC iSCSI E2E test (non-vhost)
arrays:
  - name: default
    vendor: ibm_svc
    profile:
      model: "FlashSystem-5200"
      version: "8.6.0.0"
      features:
        thin_provisioning: true
        snapshots: true
        replication: false
    endpoints:
      - protocol: iscsi
        targets:
          target_iqn: "iqn.2026-03.com.lunacy:strix.e2e.target"

pools:
  - name: gold
    array: default
    backend: malloc
    size_gb: 100
